<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY PURGE GAME - ADMIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid #ff6600;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        h1, h2 { color: #ffcc00; margin-bottom: 15px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #ff6600;
            border-radius: 10px;
            color: white;
            margin: 8px 0;
        }
        button {
            background: #ff3300;
            color: #ffcc00;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .btn-green { background: #008800; }
        .btn-red { background: #cc0000; }
        .question-item {
            background: #0a0a0a;
            border-left: 4px solid #ffcc00;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .pin-input {
            font-size: 1.5em;
            text-align: center;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-box card">
    <h1>👑 ADMIN</h1>
    <input type="password" id="adminPin" class="pin-input" maxlength="4" placeholder="CODE">
    <button onclick="checkAdminPin()">🔐 SE CONNECTER</button>
    <div id="loginError" style="color:#ff6666; margin-top:10px;"></div>
    <a href="index.html" style="color:#ffcc00;">← Retour au jeu</a>
</div>

<div id="adminPanel" style="display:none;">
    <div class="card">
        <h1>⚡ PANEL ADMIN ⚡</h1>
        <button onclick="logoutAdmin()">🚪 DÉCONNEXION</button>
        <button onclick="resetAllData()" class="btn-red">🔄 RÉINITIALISER TOUT</button>
    </div>
    
    <div class="card">
        <h2>📝 GESTION DES QUESTIONS (PARTIE 1)</h2>
        <input type="text" id="qText" placeholder="Question">
        <input type="text" id="qA" placeholder="Réponse A">
        <input type="text" id="qB" placeholder="Réponse B">
        <input type="text" id="qC" placeholder="Réponse C">
        <input type="text" id="qD" placeholder="Réponse D">
        <select id="qCorrect">
            <option value="0">A est la bonne réponse</option>
            <option value="1">B est la bonne réponse</option>
            <option value="2">C est la bonne réponse</option>
            <option value="3">D est la bonne réponse</option>
        </select>
        <button class="btn-green" onclick="addQuestion()">➕ AJOUTER LA QUESTION</button>
        
        <h3 style="margin-top:25px;">📋 QUESTIONS EXISTANTES</h3>
        <div id="questionsList">⏳ CHARGEMENT...</div>
    </div>
</div>

<script>
const ADMIN_PIN = "2007";

function checkAdminPin() {
    let pin = document.getElementById('adminPin').value;
    if(pin === ADMIN_PIN) {
        localStorage.setItem('adminLogged', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadQuestions();
    } else {
        document.getElementById('loginError').innerText = '❌ Code incorrect';
    }
}

if(localStorage.getItem('adminLogged') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadQuestions();
}

function logoutAdmin() {
    localStorage.removeItem('adminLogged');
    location.reload();
}

function toast(msg) { alert(msg); }
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

function loadQuestions() {
    let questions = JSON.parse(localStorage.getItem('partie1Questions') || '[]');
    let container = document.getElementById('questionsList');
    if(questions.length === 0) {
        container.innerHTML = '<p>Aucune question. Ajoutez-en une !</p>';
        return;
    }
    container.innerHTML = questions.map((q, i) => `
        <div class="question-item">
            <strong>❓ ${i+1}. ${escapeHtml(q.text)}</strong><br>
            A. ${escapeHtml(q.answers[0])}<br>
            B. ${escapeHtml(q.answers[1])}<br>
            C. ${escapeHtml(q.answers[2])}<br>
            D. ${escapeHtml(q.answers[3])}<br>
            ✅ Bonne réponse: ${String.fromCharCode(65 + q.correct)}
            <button class="btn-red" onclick="deleteQuestion(${i})">🗑️ SUPPRIMER</button>
        </div>
    `).join('');
}

function addQuestion() {
    let text = document.getElementById('qText').value.trim();
    let answers = [
        document.getElementById('qA').value.trim(),
        document.getElementById('qB').value.trim(),
        document.getElementById('qC').value.trim(),
        document.getElementById('qD').value.trim()
    ];
    let correct = parseInt(document.getElementById('qCorrect').value);
    
    if(!text || answers.some(a => !a)) {
        toast("❌ Remplis tous les champs");
        return;
    }
    
    let questions = JSON.parse(localStorage.getItem('partie1Questions') || '[]');
    questions.push({ text, answers, correct });
    localStorage.setItem('partie1Questions', JSON.stringify(questions));
    
    toast("✅ Question ajoutée !");
    
    document.getElementById('qText').value = '';
    document.getElementById('qA').value = '';
    document.getElementById('qB').value = '';
    document.getElementById('qC').value = '';
    document.getElementById('qD').value = '';
    
    loadQuestions();
}

function deleteQuestion(index) {
    if(confirm("Supprimer cette question ?")) {
        let questions = JSON.parse(localStorage.getItem('partie1Questions') || '[]');
        questions.splice(index, 1);
        localStorage.setItem('partie1Questions', JSON.stringify(questions));
        toast("✅ Question supprimée !");
        loadQuestions();
    }
}

function resetAllData() {
    if(confirm("⚠️ SUPPRIMER TOUTES LES DONNÉES ? (questions, messages, salons, classement)")) {
        localStorage.removeItem('partie1Questions');
        localStorage.removeItem('forumMessages');
        localStorage.removeItem('gameRooms');
        localStorage.removeItem('teams');
        toast("✅ Toutes les données ont été supprimées !");
        loadQuestions();
    }
}
</script>
</body>
</html>
