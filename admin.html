<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY PURGE GAME - ADMIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #fff; padding: 20px; }
        .card { background: #1a1a1a; border: 2px solid #ff6600; border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        h1, h2 { color: #ffcc00; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; background: #0a0a0a; border: 1px solid #ff6600; border-radius: 10px; color: white; margin: 8px 0; }
        button { background: #ff3300; color: #ffcc00; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-green { background: #008800; }
        .btn-red { background: #cc0000; }
        .question-item { background: #0a0a0a; border-left: 4px solid #ffcc00; padding: 15px; margin: 10px 0; border-radius: 10px; }
        .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
        .pin { font-size: 1.5em; text-align: center; letter-spacing: 5px; }
        .tab-buttons { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #333; padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .tab-btn.active { background: #ff3300; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .preview-img { max-width: 80px; max-height: 60px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-box card">
    <h1>👑 ADMIN</h1>
    <input type="password" id="adminPin" class="pin" maxlength="4" placeholder="CODE">
    <button onclick="checkAdminPin()">🔐 ENTRER</button>
    <div id="loginError" style="color:#ff6666; margin-top:10px;"></div>
    <a href="index.html" style="color:#ffcc00;">← Retour</a>
</div>

<div id="adminPanel" style="display:none;">
    <div class="card">
        <h1>⚡ PANEL ADMIN ⚡</h1>
        <button onclick="logoutAdmin()">🚪 DÉCONNEXION</button>
        <button class="btn-red" onclick="deleteAllData()">🗑️ TOUT SUPPRIMER</button>
    </div>

    <div class="card">
        <h2>📝 GESTION DES QUESTIONS</h2>
        <div class="tab-buttons">
            <div class="tab-btn active" onclick="showTab('partie1',this)">📝 PARTIE 1 (TEXTE)</div>
            <div class="tab-btn" onclick="showTab('partie2',this)">🖼️ PARTIE 2 (IMAGE)</div>
        </div>

        <div id="tabPartie1" class="tab-content active">
            <h3>AJOUTER QUESTION TEXTE</h3>
            <input type="text" id="q1Text" placeholder="Question">
            <input type="text" id="q1A" placeholder="Réponse A">
            <input type="text" id="q1B" placeholder="Réponse B">
            <input type="text" id="q1C" placeholder="Réponse C">
            <input type="text" id="q1D" placeholder="Réponse D">
            <select id="q1Correct"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>
            <button class="btn-green" onclick="addTextQuestion()">➕ AJOUTER</button>
            <div id="questions1List">Chargement...</div>
        </div>

        <div id="tabPartie2" class="tab-content">
            <h3>AJOUTER QUESTION AVEC IMAGE</h3>
            <p style="color:#ffaa00; font-size:12px;">📸 1. Va sur Imgur.com → upload ton image → copie le lien direct</p>
            <input type="text" id="q2Text" placeholder="Question">
            <input type="text" id="q2ImageUrl" placeholder="Lien de l'image (Imgur)">
            <input type="text" id="q2A" placeholder="Réponse A">
            <input type="text" id="q2B" placeholder="Réponse B">
            <input type="text" id="q2C" placeholder="Réponse C">
            <input type="text" id="q2D" placeholder="Réponse D">
            <select id="q2Correct"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>
            <button class="btn-green" onclick="addImageQuestion()">➕ AJOUTER</button>
            <div id="questions2List">Chargement...</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ========== FIREBASE V4 ==========
const firebaseConfig = {
    apiKey: "AIzaSyAG30Darx6LTAc9XQVYOOEDC6L1AvKeFQA",
    authDomain: "joy-purge-game-v4.firebaseapp.com",
    databaseURL: "https://joy-purge-game-v4-default-rtdb.firebaseio.com",
    projectId: "joy-purge-game-v4",
    storageBucket: "joy-purge-game-v4.firebasestorage.app",
    messagingSenderId: "755752838683",
    appId: "1:755752838683:web:1899003609bb486871fabe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_PIN = "2007";

function checkAdminPin() {
    let pin = document.getElementById('adminPin').value;
    if(pin === ADMIN_PIN) {
        localStorage.setItem('adminLogged', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAllQuestions();
    } else {
        document.getElementById('loginError').innerText = '❌ Code incorrect';
    }
}

if(localStorage.getItem('adminLogged') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAllQuestions();
}

function logoutAdmin() { localStorage.removeItem('adminLogged'); location.reload(); }
function toast(msg) { alert(msg); }
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

function showTab(tab, btn) {
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById(`tab${tab==='partie1'?'Partie1':'Partie2'}`).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

async function loadAllQuestions() {
    await loadQuestions('partie1','questions1List');
    await loadQuestions('partie2','questions2List');
}

async function loadQuestions(mode, containerId) {
    try {
        let snap = await db.ref(`questions/${mode}`).once('value');
        let questions = [];
        snap.forEach(c => questions.push({ id: c.key, ...c.val() }));
        let container = document.getElementById(containerId);
        if(questions.length === 0) { container.innerHTML = '<p>Aucune question</p>'; return; }
        container.innerHTML = questions.map((q,i) => `
            <div class="question-item">
                <b>❓ ${i+1}. ${escapeHtml(q.text)}</b><br>
                ${q.image ? `<img src="${q.image}" class="preview-img">` : ''}
                A. ${escapeHtml(q.answers[0])}<br>
                B. ${escapeHtml(q.answers[1])}<br>
                C. ${escapeHtml(q.answers[2])}<br>
                D. ${escapeHtml(q.answers[3])}<br>
                ✅ Bonne: ${String.fromCharCode(65+q.correct)}
                <button class="btn-red" onclick="deleteQuestion('${mode}','${q.id}')">🗑️</button>
            </div>
        `).join('');
    } catch(e) { console.log(e); }
}

async function addTextQuestion() {
    let text = document.getElementById('q1Text').value.trim();
    let answers = [
        document.getElementById('q1A').value.trim(),
        document.getElementById('q1B').value.trim(),
        document.getElementById('q1C').value.trim(),
        document.getElementById('q1D').value.trim()
    ];
    let correct = parseInt(document.getElementById('q1Correct').value);
    if(!text || answers.some(a=>!a)) { toast("Remplis tous les champs"); return; }
    try {
        await db.ref('questions/partie1').push({ text, answers, correct, createdAt:Date.now() });
        toast("✅ Question ajoutée !");
        document.getElementById('q1Text').value = '';
        document.getElementById('q1A').value = '';
        document.getElementById('q1B').value = '';
        document.getElementById('q1C').value = '';
        document.getElementById('q1D').value = '';
        loadQuestions('partie1','questions1List');
    } catch(e) { toast("Erreur: "+e.message, true); }
}

async function addImageQuestion() {
    let text = document.getElementById('q2Text').value.trim();
    let imageUrl = document.getElementById('q2ImageUrl').value.trim();
    let answers = [
        document.getElementById('q2A').value.trim(),
        document.getElementById('q2B').value.trim(),
        document.getElementById('q2C').value.trim(),
        document.getElementById('q2D').value.trim()
    ];
    let correct = parseInt(document.getElementById('q2Correct').value);
    if(!text || !imageUrl || answers.some(a=>!a)) { toast("Remplis tous les champs", true); return; }
    try {
        await db.ref('questions/partie2').push({ text, image: imageUrl, answers, correct, createdAt:Date.now() });
        toast("✅ Question image ajoutée !");
        document.getElementById('q2Text').value = '';
        document.getElementById('q2ImageUrl').value = '';
        document.getElementById('q2A').value = '';
        document.getElementById('q2B').value = '';
        document.getElementById('q2C').value = '';
        document.getElementById('q2D').value = '';
        loadQuestions('partie2','questions2List');
    } catch(e) { toast("Erreur: "+e.message, true); }
}

window.deleteQuestion = async (mode, id) => {
    if(confirm("Supprimer ?")) {
        try { await db.ref(`questions/${mode}/${id}`).remove(); toast("✅ Supprimée !"); loadQuestions(mode, mode==='partie1'?'questions1List':'questions2List'); }
        catch(e) { toast("Erreur: "+e.message, true); }
    }
};

async function deleteAllData() {
    if(confirm("⚠️ SUPPRIMER TOUTES LES DONNÉES ?")) {
        try {
            let q1 = await db.ref('questions/partie1').once('value');
            if(q1.val()) for(let k of Object.keys(q1.val())) await db.ref(`questions/partie1/${k}`).remove();

            let q2 = await db.ref('questions/partie2').once('value');
            if(q2.val()) for(let k of Object.keys(q2.val())) await db.ref(`questions/partie2/${k}`).remove();

            let f = await db.ref('forum').once('value');
            if(f.val()) for(let k of Object.keys(f.val())) await db.ref(`forum/${k}`).remove();

            let r = await db.ref('rooms').once('value');
            if(r.val()) for(let k of Object.keys(r.val())) await db.ref(`rooms/${k}`).remove();

            let t = await db.ref('teams').once('value');
            if(t.val()) for(let k of Object.keys(t.val())) await db.ref(`teams/${k}`).remove();

            toast("✅ TOUTES DONNÉES SUPPRIMÉES !");
            loadAllQuestions();
        } catch(e) { toast("Erreur: "+e.message, true); }
    }
}
</script>
</body>
</html>
