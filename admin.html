<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - JOY PURGE GAME</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #0a0a0a; color: #fff; padding: 20px; }
        .card { background: #1a1a1a; border: 2px solid #ff6600; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        h1, h2 { color: #ffcc00; margin-bottom: 15px; }
        input, select { width: 100%; padding: 8px; background: #0a0a0a; border: 1px solid #ff6600; border-radius: 8px; color: white; margin: 5px 0; }
        button { background: #ff3300; color: #ffcc00; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin: 5px; }
        .btn-green { background: #008800; }
        .btn-red { background: #cc0000; }
        .question { background: #0a0a0a; border-left: 3px solid #ffcc00; padding: 10px; margin: 10px 0; }
        .login { max-width: 350px; margin: 100px auto; text-align: center; }
    </style>
</head>
<body>
<div id="loginBox" class="login card">
    <h1>👑 ADMIN</h1>
    <input type="password" id="pin" maxlength="4" placeholder="CODE">
    <button onclick="checkPin()">🔐 ENTRER</button>
    <div id="loginErr" style="color:red;"></div>
    <a href="index.html" style="color:#ffcc00;">← Retour</a>
</div>
<div id="adminPanel" style="display:none;">
    <div class="card"><h1>⚡ ADMIN PANEL ⚡</h1><button onclick="logout()">🚪 DÉCONNEXION</button></div>
    <div class="card"><h2>📝 AJOUTER QUESTION (TEXTE)</h2>
        <input type="text" id="qText" placeholder="Question">
        <input type="text" id="qA" placeholder="Réponse A">
        <input type="text" id="qB" placeholder="Réponse B">
        <input type="text" id="qC" placeholder="Réponse C">
        <input type="text" id="qD" placeholder="Réponse D">
        <select id="qCorrect"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>
        <button class="btn-green" onclick="addTextQuestion()">➕ AJOUTER</button>
        <div id="questionsList"></div>
    </div>
    <div class="card"><h2>⚠️ DANGER</h2><button class="btn-red" onclick="deleteAll()">🗑️ SUPPRIMER TOUTES DONNÉES</button></div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = { apiKey: "AIzaSyAQI15uRPi-KpQbX4dbLKz1TdzlvHPo_14", authDomain: "joy-purge-game-v2.firebaseapp.com", projectId: "joy-purge-game-v2", storageBucket: "joy-purge-game-v2.firebasestorage.app", messagingSenderId: "1002586059927", appId: "1:1002586059927:web:c46c898954ddcb4dee65d2" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_PIN = "2007";
function checkPin() { if(document.getElementById('pin').value===ADMIN_PIN){ localStorage.setItem('admin','true'); document.getElementById('loginBox').style.display='none'; document.getElementById('adminPanel').style.display='block'; loadQuestions(); }else{ document.getElementById('loginErr').innerText='❌ Code incorrect'; } }
if(localStorage.getItem('admin')==='true'){ document.getElementById('loginBox').style.display='none'; document.getElementById('adminPanel').style.display='block'; loadQuestions(); }
function logout(){ localStorage.removeItem('admin'); location.reload(); }
function toast(msg){ alert(msg); }
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
async function loadQuestions(){ var snap=await db.ref('questions/partie1').once('value'); var qs=[]; snap.forEach(c=>qs.push({ id:c.key, ...c.val() })); var div=document.getElementById('questionsList'); if(qs.length===0){ div.innerHTML='<p>Aucune question</p>'; return; } div.innerHTML=qs.map((q,i)=>`<div class="question"><b>❓ ${i+1}. ${escapeHtml(q.text)}</b><br>A. ${escapeHtml(q.answers[0])}<br>B. ${escapeHtml(q.answers[1])}<br>C. ${escapeHtml(q.answers[2])}<br>D. ${escapeHtml(q.answers[3])}<br>✅ Bonne: ${String.fromCharCode(65+q.correct)}<button class="btn-red" onclick="deleteQuestion('${q.id}')">🗑️</button></div>`).join(''); }
async function addTextQuestion(){ var text=document.getElementById('qText').value.trim(); var ans=[document.getElementById('qA').value.trim(), document.getElementById('qB').value.trim(), document.getElementById('qC').value.trim(), document.getElementById('qD').value.trim()]; var correct=parseInt(document.getElementById('qCorrect').value); if(!text||ans.some(a=>!a)){ toast("Remplissez tous les champs"); return; } await db.ref('questions/partie1').push({ text:text, answers:ans, correct:correct, createdAt:Date.now() }); toast("✅ Question ajoutée !"); document.getElementById('qText').value=''; document.getElementById('qA').value=''; document.getElementById('qB').value=''; document.getElementById('qC').value=''; document.getElementById('qD').value=''; loadQuestions(); }
window.deleteQuestion=async(id)=>{ if(confirm("Supprimer ?")){ await db.ref(`questions/partie1/${id}`).remove(); loadQuestions(); } };
async function deleteAll(){ if(confirm("⚠️ SUPPRIMER TOUTES LES DONNÉES ?")){ var q=await db.ref('questions/partie1').once('value'); if(q.val()) for(let k of Object.keys(q.val())) await db.ref(`questions/partie1/${k}`).remove(); var f=await db.ref('forum').once('value'); if(f.val()) for(let k of Object.keys(f.val())) await db.ref(`forum/${k}`).remove(); var r=await db.ref('rooms').once('value'); if(r.val()) for(let k of Object.keys(r.val())) await db.ref(`rooms/${k}`).remove(); var t=await db.ref('teams').once('value'); if(t.val()) for(let k of Object.keys(t.val())) await db.ref(`teams/${k}`).remove(); toast("✅ TOUTES DONNÉES SUPPRIMÉES !"); loadQuestions(); } }
</script>
</body>
</html>
