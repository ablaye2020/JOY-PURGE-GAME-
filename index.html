<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY PURGE GAME - TEST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('E6E73627-50E3-4391-A7CD-F78DF1523269.png');
            background-size: cover;
            background-position: center;
            opacity: 0.85;
            z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(0,0,0,0.8); border: 2px solid #ff6600; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h1 { color: #ffcc00; text-align: center; margin-bottom: 10px; }
        .btn { background: #ff3300; color: #ffcc00; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; margin: 10px 5px; font-weight: bold; font-size: 16px; }
        .btn-green { background: #008800; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #ff6600; border-radius: 10px; color: white; margin: 8px 0; font-size: 16px; }
        .code-display { font-size: 2.5em; text-align: center; background: #000; padding: 20px; border-radius: 15px; letter-spacing: 10px; color: #ffcc00; margin: 15px 0; font-weight: bold; }
        .players-area { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
        .player-slot { background: rgba(0,0,0,0.6); border: 2px solid #ff6600; border-radius: 15px; padding: 15px; min-width: 120px; text-align: center; }
        .player-slot.filled { border-color: #00ff00; background: rgba(0,100,0,0.3); }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: #222; border: 2px solid #ff6600; padding: 10px 25px; border-radius: 30px; color: #ffcc00; cursor: pointer; font-size: 16px; }
        .nav-btn.active { background: #ff3300; }
        .section { display: none; }
        .section.active { display: block; }
        .admin-link { position: fixed; bottom: 20px; left: 20px; background: #ff3300; padding: 8px 18px; border-radius: 30px; color: white; text-decoration: none; z-index: 200; font-weight: bold; }
        .message-list { max-height: 300px; overflow-y: auto; }
        .forum-msg { background: rgba(0,0,0,0.5); border-left: 3px solid #ff6600; padding: 10px; margin: 8px 0; border-radius: 8px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ffcc00; color: #000; padding: 10px 20px; border-radius: 30px; z-index: 1000; font-weight: bold; animation: fadeOut 2s; }
        @keyframes fadeOut { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
<div class="container">
    <a href="admin.html" class="admin-link">👑 ADMIN</a>
    
    <div class="card" style="text-align:center;">
        <h1>⚡ JOY PURGE GAME ⚡</h1>
        <p>"UN SEUL FAUX = 0 POINT"</p>
    </div>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showSection('classement')">🏆 CLASSEMENT</button>
        <button class="nav-btn" onclick="showSection('jeu')">🎮 JOUER</button>
        <button class="nav-btn" onclick="showSection('forum')">💬 FORUM</button>
    </div>
    
    <!-- CLASSEMENT -->
    <div id="classement" class="section active">
        <div class="card">
            <h2>🏆 CLASSEMENT</h2>
            <div id="rankingList">Aucune équipe pour le moment</div>
        </div>
    </div>
    
    <!-- JEU -->
    <div id="jeu" class="section">
        <div class="card">
            <h2>🎮 JOY PURGE GAME</h2>
            <div id="lobbyScreen">
                <div style="margin-bottom:25px;">
                    <h3>🚀 CRÉER UN SALON</h3>
                    <input type="text" id="teamName" placeholder="Nom de l'équipe">
                    <input type="text" id="playerName" placeholder="Ton pseudo">
                    <button class="btn btn-green" onclick="createNewRoom()">🔥 CRÉER LE SALON</button>
                </div>
                <hr style="border-color:#ff6600; margin:20px 0;">
                <div>
                    <h3>🔑 REJOINDRE UN SALON</h3>
                    <input type="text" id="joinCodeInput" maxlength="4" placeholder="Code à 4 chiffres">
                    <input type="text" id="joinPlayerNameInput" placeholder="Ton pseudo">
                    <button class="btn" onclick="joinExistingRoom()">🔐 REJOINDRE</button>
                </div>
            </div>
            <div id="roomScreen" style="display:none;"></div>
        </div>
    </div>
    
    <!-- FORUM -->
    <div id="forum" class="section">
        <div class="card">
            <h2>💬 FORUM</h2>
            <input type="text" id="forumPseudo" placeholder="Ton pseudo">
            <textarea id="forumMsg" rows="2" placeholder="Ton message..."></textarea>
            <button class="btn" onclick="addForumMessage()">📢 PUBLIER</button>
            <div id="forumMessagesList" class="message-list">Aucun message</div>
        </div>
    </div>
</div>

<script>
// ========== VARIABLES ==========
let currentRoom = null;
let currentPlayerId = localStorage.getItem('playerId');
if(!currentPlayerId) {
    currentPlayerId = Math.random().toString(36).substr(2, 8);
    localStorage.setItem('playerId', currentPlayerId);
}
let allMessages = JSON.parse(localStorage.getItem('forumMessages') || '[]');
let allRooms = JSON.parse(localStorage.getItem('gameRooms') || '{}');
let allTeams = JSON.parse(localStorage.getItem('teams') || '[]');

// ========== FONCTIONS UTILITAIRES ==========
function toast(msg) {
    var t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

function showSection(section) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(section).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if(section === 'classement') updateRanking();
    if(section === 'forum') updateForum();
}

// ========== CLASSEMENT ==========
function updateRanking() {
    let teams = [...allTeams];
    teams.sort((a,b) => (b.score || 0) - (a.score || 0));
    let container = document.getElementById('rankingList');
    if(teams.length === 0) {
        container.innerHTML = 'Aucune équipe classée';
        return;
    }
    container.innerHTML = teams.map((t, i) => `
        <div style="background:rgba(0,0,0,0.6); border-left:4px solid #ffcc00; padding:12px; margin:8px 0; display:flex; justify-content:space-between;">
            <div><b>${i === 0 ? '👑 ' : ''}⚔️ ${escapeHtml(t.teamName)}</b><br><small>${t.players ? t.players.map(p => escapeHtml(p.name)).join(' · ') : ''}</small></div>
            <div>⭐ ${t.score || 0} pts</div>
        </div>
    `).join('');
}

// ========== FORUM ==========
function updateForum() {
    let container = document.getElementById('forumMessagesList');
    if(allMessages.length === 0) {
        container.innerHTML = 'Aucun message';
        return;
    }
    container.innerHTML = allMessages.slice().reverse().map(m => `
        <div class="forum-msg">
            <b>🔥 ${escapeHtml(m.author)}</b> <small>${m.date || ''}</small><br>
            ${escapeHtml(m.message)}
        </div>
    `).join('');
}

function addForumMessage() {
    let author = document.getElementById('forumPseudo').value.trim();
    let message = document.getElementById('forumMsg').value.trim();
    if(!author || !message) {
        toast("❌ Pseudo et message requis");
        return;
    }
    allMessages.push({
        author: author,
        message: message,
        date: new Date().toLocaleString()
    });
    localStorage.setItem('forumMessages', JSON.stringify(allMessages));
    toast("✅ Message publié !");
    document.getElementById('forumPseudo').value = '';
    document.getElementById('forumMsg').value = '';
    updateForum();
}

// ========== CRÉER UN SALON ==========
function createNewRoom() {
    let teamName = document.getElementById('teamName').value.trim();
    let playerName = document.getElementById('playerName').value.trim();
    
    if(!teamName) { toast("❌ Nom de l'équipe requis"); return; }
    if(!playerName) { toast("❌ Ton pseudo requis"); return; }
    
    let code = Math.floor(1000 + Math.random() * 9000).toString();
    
    let newRoom = {
        teamName: teamName,
        code: code,
        players: [{
            id: currentPlayerId,
            name: playerName,
            score: 0
        }],
        status: 'waiting',
        createdAt: Date.now()
    };
    
    allRooms[code] = newRoom;
    localStorage.setItem('gameRooms', JSON.stringify(allRooms));
    
    currentRoom = newRoom;
    toast(`✅ Salon "${teamName}" créé ! Code: ${code}`);
    showRoomScreen();
}

// ========== REJOINDRE UN SALON ==========
function joinExistingRoom() {
    let code = document.getElementById('joinCodeInput').value.trim();
    let playerName = document.getElementById('joinPlayerNameInput').value.trim();
    
    if(!code || code.length !== 4) { toast("❌ Code invalide (4 chiffres)"); return; }
    if(!playerName) { toast("❌ Ton pseudo requis"); return; }
    
    let room = allRooms[code];
    if(!room) { toast("❌ Salon introuvable"); return; }
    if(room.players.length >= 4) { toast("❌ Salon complet (4/4)"); return; }
    if(room.status !== 'waiting') { toast("❌ Partie déjà commencée"); return; }
    
    room.players.push({
        id: currentPlayerId,
        name: playerName,
        score: 0
    });
    
    allRooms[code] = room;
    localStorage.setItem('gameRooms', JSON.stringify(allRooms));
    
    currentRoom = room;
    toast(`✅ Rejoint "${room.teamName}" !`);
    showRoomScreen();
}

// ========== AFFICHER SALLE D'ATTENTE ==========
function showRoomScreen() {
    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('roomScreen').style.display = 'block';
    
    let isHost = currentRoom.players[0].id === currentPlayerId;
    let playerCount = currentRoom.players.length;
    
    let playersHtml = '<div class="players-area">';
    for(let i = 0; i < 4; i++) {
        let player = currentRoom.players[i];
        playersHtml += `
            <div class="player-slot ${player ? 'filled' : ''}">
                <div style="font-size:2.5em;">${player ? '👤' : '❓'}</div>
                <div><strong>${player ? escapeHtml(player.name) : 'En attente...'}</strong></div>
            </div>
        `;
    }
    playersHtml += '</div>';
    
    let html = `
        <div style="text-align:center;">
            <h2>🎮 ${escapeHtml(currentRoom.teamName)}</h2>
            <div class="code-display">🔑 ${currentRoom.code}</div>
            <button class="btn" onclick="copyCode()">📋 COPIER LE CODE</button>
            ${playersHtml}
    `;
    
    if(isHost && playerCount >= 2) {
        html += `<button class="btn btn-green" onclick="startGame()">🎮 COMMENCER LA PARTIE (${playerCount}/4)</button>`;
    } else if(isHost) {
        html += `<p>⏳ En attente de joueurs... (${playerCount}/4, minimum 2)</p>`;
    } else {
        html += `<p>⏳ En attente que l'hôte commence la partie...</p>`;
    }
    
    html += `<button class="btn" onclick="leaveRoom()">❌ QUITTER</button></div>`;
    document.getElementById('roomScreen').innerHTML = html;
}

function copyCode() {
    navigator.clipboard.writeText(currentRoom.code);
    toast("✅ Code copié !");
}

function leaveRoom() {
    // Enlever le joueur du salon
    if(currentRoom) {
        currentRoom.players = currentRoom.players.filter(p => p.id !== currentPlayerId);
        if(currentRoom.players.length === 0) {
            delete allRooms[currentRoom.code];
        } else {
            allRooms[currentRoom.code] = currentRoom;
        }
        localStorage.setItem('gameRooms', JSON.stringify(allRooms));
    }
    currentRoom = null;
    document.getElementById('lobbyScreen').style.display = 'block';
    document.getElementById('roomScreen').style.display = 'none';
    document.getElementById('joinCodeInput').value = '';
    document.getElementById('teamName').value = '';
    document.getElementById('playerName').value = '';
    document.getElementById('joinPlayerNameInput').value = '';
    toast("✅ Salon quitté");
}

function startGame() {
    toast("🎮 Partie démarrée ! (Version démo)");
    // Ici on ajoutera les questions plus tard
}

// ========== QUESTIONS POUR PARTIE 1 ==========
let partie1Questions = JSON.parse(localStorage.getItem('partie1Questions') || '[]');

// ========== INIT ==========
function escapeHtml(s) {
    if(!s) return '';
    return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

// Charger les données existantes
updateRanking();
updateForum();

console.log("Site chargé - Les boutons devraient fonctionner !");
</script>
</body>
</html>
