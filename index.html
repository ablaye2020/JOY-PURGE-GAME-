<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY PURGE GAME</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #fff; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('luffy.png'); background-size: cover; background-position: center; opacity: 0.85; z-index: 0; }
        .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(0,0,0,0.75); border: 2px solid #ff6600; border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(3px); }
        h1, h2, h3 { color: #ffcc00; text-align: center; margin-bottom: 15px; }
        .btn { background: #ff3300; color: #ffcc00; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-green { background: #008800; }
        input, textarea { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #ff6600; border-radius: 10px; color: white; margin: 8px 0; }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: #222; border: 2px solid #ff6600; padding: 10px 25px; border-radius: 30px; color: #ffcc00; cursor: pointer; }
        .nav-btn.active { background: #ff3300; }
        .section { display: none; }
        .section.active { display: block; }
        .players-area { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
        .player-card { background: rgba(0,0,0,0.6); border: 2px solid #ff6600; border-radius: 15px; padding: 15px; min-width: 120px; text-align: center; }
        .player-card.filled { border-color: #00ff00; }
        .code-box { font-size: 2em; text-align: center; background: #000; padding: 15px; border-radius: 15px; letter-spacing: 8px; color: #ffcc00; margin: 15px 0; font-weight: bold; }
        .team-card { background: rgba(0,0,0,0.6); border-left: 4px solid #ffcc00; padding: 10px; margin: 8px 0; display: flex; justify-content: space-between; }
        .quiz-area { background: rgba(0,0,0,0.95); border-radius: 20px; padding: 25px; }
        .question-text { font-size: 1.2em; text-align: center; margin: 20px 0; color: #ffcc00; }
        .answers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .answer { background: #333; border: 2px solid #ff6600; padding: 15px; border-radius: 15px; cursor: pointer; text-align: center; }
        .answer:hover { background: #ff3300; }
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffcc00, #ff6600); width: 0%; }
        .forum-msg { background: rgba(0,0,0,0.5); border-left: 3px solid #ff6600; padding: 10px; margin: 8px 0; border-radius: 8px; }
        .admin-link { position: fixed; bottom: 20px; left: 20px; background: #ff3300; padding: 8px 18px; border-radius: 30px; color: white; text-decoration: none; z-index: 200; font-weight: bold; }
        .music-btn { position: fixed; bottom: 20px; right: 20px; background: #000; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #ff6600; z-index: 200; font-size: 22px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ffcc00; color: #000; padding: 10px 20px; border-radius: 30px; z-index: 1000; font-weight: bold; animation: fadeOut 2s; }
        @keyframes fadeOut { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
        @media (max-width: 700px) { .answers { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <a href="admin.html" class="admin-link">👑 ADMIN</a>
    <div class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</div>
    
    <div class="card" style="text-align:center;"><h1>⚡ JOY PURGE GAME ⚡</h1><p>"UN SEUL FAUX = 0 POINT"</p></div>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showSection('classement')">🏆 CLASSEMENT</button>
        <button class="nav-btn" onclick="showSection('jeu')">🎮 JOUER</button>
        <button class="nav-btn" onclick="showSection('forum')">💬 FORUM</button>
    </div>
    
    <div id="classement" class="section active"><div class="card"><h2>🏆 CLASSEMENT</h2><div id="rankingList">Chargement...</div></div></div>
    
    <div id="jeu" class="section">
        <div class="card">
            <h2>🎮 JOY PURGE GAME</h2>
            <div id="lobbyView">
                <div><h3>🚀 CRÉER UN SALON</h3><input type="text" id="teamName" placeholder="Nom équipe"><input type="text" id="playerName" placeholder="Ton pseudo"><button class="btn btn-green" onclick="createTeam()">🔥 CRÉER</button></div>
                <hr><div><h3>🔑 REJOINDRE</h3><input type="text" id="joinCode" maxlength="4" placeholder="Code"><input type="text" id="joinPlayerName" placeholder="Ton pseudo"><button class="btn" onclick="joinTeam()">🔐 REJOINDRE</button></div>
            </div>
            <div id="roomView" style="display:none;"></div>
        </div>
    </div>
    
    <div id="forum" class="section">
        <div class="card"><h2>💬 FORUM</h2><input type="text" id="forumPseudo" placeholder="Pseudo"><textarea id="forumMessage" rows="2" placeholder="Message..."></textarea><button class="btn" onclick="postMessage()">📢 PUBLIER</button><div id="forumList">Chargement...</div></div>
    </div>
</div>

<audio id="bgMusic" loop><source src="song.mp3.m4a" type="audio/mp4"></audio>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCIAbgsaNBm2K2NhHzkefT77eOW2wwiBhw",
    authDomain: "joy-purge-game.firebaseapp.com",
    projectId: "joy-purge-game",
    storageBucket: "joy-purge-game.firebasestorage.app",
    messagingSenderId: "266355310555",
    appId: "1:266355310555:web:5d5296e5b138d4221db1fe"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoomCode = null;
let currentPlayerId = localStorage.getItem('playerId');
if(!currentPlayerId) { currentPlayerId = Math.random().toString(36).substr(2, 8); localStorage.setItem('playerId', currentPlayerId); }
let musicPlaying = false;
let bgMusic = null;
let roomListener = null;
let currentQuestions = [];

function initMusic() { bgMusic = document.getElementById('bgMusic'); if(bgMusic) bgMusic.volume = 0.2; }
function toggleMusic() { if(!bgMusic) initMusic(); if(musicPlaying) { bgMusic.pause(); musicPlaying=false; document.getElementById('musicBtn').innerHTML='🎵'; } else { bgMusic.play().catch(e=>{}); musicPlaying=true; document.getElementById('musicBtn').innerHTML='🎵🔊'; } }
document.body.addEventListener('click', ()=>{ if(!musicPlaying && bgMusic) { bgMusic.play().catch(e=>{}); musicPlaying=true; document.getElementById('musicBtn').innerHTML='🎵🔊'; } }, {once:true});

function toast(msg, err) { let t=document.createElement('div'); t.className='toast'; t.style.background=err?'#cc0000':'#ffcc00'; t.style.color=err?'#fff':'#000'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function showSection(s) { document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(s).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); if(s=='classement') loadRanking(); if(s=='forum') loadForum(); }

async function loadRanking() {
    try {
        let snap = await db.ref('teams/partie1').once('value');
        let teams = [];
        snap.forEach(c => teams.push(c.val()));
        teams.sort((a,b)=>(b.score||0)-(a.score||0));
        let div = document.getElementById('rankingList');
        if(teams.length===0) { div.innerHTML='Aucune équipe'; return; }
        div.innerHTML = teams.map((t,i)=>`<div class="team-card"><div><b>${i==0?'👑 ':''}${escapeHtml(t.teamName)}</b><br><small>${t.players?Object.values(t.players).map(p=>escapeHtml(p.name)).join(' · '):''}</small></div><div>⭐ ${t.score||0} pts</div></div>`).join('');
    } catch(e) { console.log(e); }
}

async function loadForum() {
    try {
        let snap = await db.ref('forum').once('value');
        let msgs = [];
        snap.forEach(c => msgs.push(c.val()));
        msgs.reverse();
        let div = document.getElementById('forumList');
        if(msgs.length===0) { div.innerHTML='Aucun message'; return; }
        div.innerHTML = msgs.map(m=>`<div class="forum-msg"><b>🔥 ${escapeHtml(m.author)}</b> <small>${m.date||''}</small><br>${escapeHtml(m.message)}</div>`).join('');
    } catch(e) { console.log(e); }
}

async function postMessage() {
    let a = document.getElementById('forumPseudo').value.trim();
    let m = document.getElementById('forumMessage').value.trim();
    if(!a||!m) { toast("Pseudo et message requis", true); return; }
    try {
        await db.ref('forum').push({ author:a, message:m, date:new Date().toLocaleString() });
        toast("Message publié !");
        document.getElementById('forumPseudo').value = '';
        document.getElementById('forumMessage').value = '';
        loadForum();
    } catch(e) { toast("Erreur: "+e.message, true); }
}

async function createTeam() {
    let tn = document.getElementById('teamName').value.trim();
    let pn = document.getElementById('playerName').value.trim();
    if(!tn||!pn) { toast("Nom et pseudo requis", true); return; }
    let code = Math.floor(1000+Math.random()*9000).toString();
    let roomRef = db.ref(`rooms/${code}`);
    try {
        let exists = await roomRef.once('value');
        if(exists.exists()) { createTeam(); return; }
        await roomRef.set({ teamName:tn, players: [{ id:currentPlayerId, name:pn, score:0, answers:[] }], status:'waiting', createdAt:Date.now() });
        toast(`✅ Salon créé ! Code: ${code}`);
        enterRoom(code);
    } catch(e) { toast("Erreur: "+e.message, true); }
}

async function joinTeam() {
    let code = document.getElementById('joinCode').value.trim();
    let pn = document.getElementById('joinPlayerName').value.trim();
    if(!code||code.length!==4) { toast("Code invalide", true); return; }
    if(!pn) { toast("Pseudo requis", true); return; }
    let roomRef = db.ref(`rooms/${code}`);
    try {
        let room = (await roomRef.once('value')).val();
        if(!room) { toast("Salon introuvable", true); return; }
        if(room.players.length >= 4) { toast("Salon complet", true); return; }
        if(room.status !== 'waiting') { toast("Partie déjà commencée", true); return; }
        room.players.push({ id:currentPlayerId, name:pn, score:0, answers:[] });
        await roomRef.set(room);
        toast(`✅ Rejoint "${room.teamName}"`);
        enterRoom(code);
    } catch(e) { toast("Erreur: "+e.message, true); }
}

function enterRoom(code) {
    currentRoomCode = code;
    document.getElementById('lobbyView').style.display = 'none';
    document.getElementById('roomView').style.display = 'block';
    if(roomListener) roomListener();
    watchRoom(code);
}

function watchRoom(code) {
    let roomRef = db.ref(`rooms/${code}`);
    roomListener = roomRef.on('value', (snap) => {
        let room = snap.val();
        if(!room) { leaveRoom(); return; }
        let isHost = room.players[0]?.id === currentPlayerId;
        let playerCount = room.players.length;
        let html = `<div style="text-align:center;"><h2>🎮 ${escapeHtml(room.teamName)}</h2><div class="code-box">🔑 ${code}</div><button class="btn" onclick="copyCode('${code}')">📋 COPIER</button><div class="players-area">`;
        for(let i=0; i<4; i++) {
            let p = room.players[i];
            html += `<div class="player-card ${p?'filled':''}"><div style="font-size:2.5em;">${p?'👤':'❓'}</div><div>${p?escapeHtml(p.name):'En attente...'}</div></div>`;
        }
        html += `</div>`;
        if(isHost && playerCount>=2) { html += `<button class="btn btn-green" onclick="startGame('${code}')">🎮 COMMENCER (${playerCount}/4)</button>`; }
        else if(isHost) { html += `<p>⏳ En attente... (${playerCount}/4 min 2)</p>`; }
        else { html += `<p>⏳ En attente que l'hôte commence...</p>`; }
        html += `<button class="btn" onclick="leaveRoom()">❌ QUITTER</button></div>`;
        document.getElementById('roomView').innerHTML = html;
    });
}

function copyCode(code) { navigator.clipboard.writeText(code); toast("Code copié !"); }

async function startGame(code) {
    await loadQuestions('partie1');
    let roomRef = db.ref(`rooms/${code}`);
    await roomRef.update({ status:'playing', currentQuestion:0, currentPart:'partie1' });
    await loadNextQuestion(code,0);
}

async function loadQuestions(part) {
    let snap = await db.ref(`questions/${part}`).once('value');
    currentQuestions = [];
    snap.forEach(c => currentQuestions.push(c.val()));
    console.log("Questions chargées:", currentQuestions.length);
}

async function loadNextQuestion(code, qIndex) {
    if(qIndex >= currentQuestions.length) {
        let roomRef = db.ref(`rooms/${code}`);
        let room = (await roomRef.once('value')).val();
        let total = room.players.reduce((s,p)=>s+(p.score||0),0);
        await roomRef.update({ status:'finished', finalScore:total });
        let teamData = { teamName:room.teamName, players:room.players, score:total, date:Date.now() };
        await db.ref(`teams/partie1/${code}`).set(teamData);
        toast(`🏆 Partie terminée ! Score: ${total} points`);
        loadRanking();
        return;
    }
    let roomRef = db.ref(`rooms/${code}`);
    await roomRef.update({ currentQuestion:qIndex });
    let room = (await roomRef.once('value')).val();
    await showQuiz(room, code);
}

async function showQuiz(room, code) {
    let q = currentQuestions[room.currentQuestion];
    if(!q) return;
    let totalScore = room.players.reduce((s,p)=>s+(p.score||0),0);
    let html = `<div class="quiz-area"><div>🏆 SCORE: ${totalScore} pts</div><div>📋 Question ${room.currentQuestion+1}/${currentQuestions.length}</div>`;
    if(q.image) html += `<img src="${q.image}" style="max-width:100%; max-height:150px; margin:10px auto; display:block;">`;
    html += `<div class="question-text">${escapeHtml(q.text)}</div><div class="answers">`;
    q.answers.forEach((ans,i)=>{ html += `<div class="answer" onclick="submitAnswer('${code}',${room.currentQuestion},${i})">${String.fromCharCode(65+i)}. ${escapeHtml(ans)}</div>`; });
    html += `</div></div>`;
    document.getElementById('roomView').innerHTML = html;
}

async function submitAnswer(code, qIndex, ansIdx) {
    let roomRef = db.ref(`rooms/${code}`);
    let room = (await roomRef.once('value')).val();
    let q = currentQuestions[qIndex];
    let playerIndex = room.players.findIndex(p => p.id === currentPlayerId);
    if(room.players[playerIndex].answers?.includes(qIndex)) { toast("Déjà répondu !", true); return; }
    room.players[playerIndex].answers = [...(room.players[playerIndex].answers||[]), qIndex];
    room.players[playerIndex].lastAnswer = ansIdx;
    await roomRef.set(room);
    let allAnswered = room.players.every(p => p.answers?.includes(qIndex));
    if(allAnswered) {
        let allCorrect = room.players.every(p => p.lastAnswer === q.correct);
        if(allCorrect) {
            for(let p of room.players) { p.score = (p.score||0)+10; }
            toast("✅ TOUS JUSTES ! +10 points !");
        } else { toast("❌ QUELQU'UN A FAUX ! 0 point !"); }
        await roomRef.set(room);
        await loadNextQuestion(code, qIndex+1);
    } else { toast("✅ Réponse enregistrée ! En attente..."); }
}

async function leaveRoom() {
    if(currentRoomCode) {
        let roomRef = db.ref(`rooms/${currentRoomCode}`);
        let room = (await roomRef.once('value')).val();
        if(room) {
            room.players = room.players.filter(p => p.id !== currentPlayerId);
            if(room.players.length === 0) { await roomRef.remove(); }
            else { await roomRef.set(room); }
        }
    }
    if(roomListener) roomListener();
    currentRoomCode = null;
    document.getElementById('lobbyView').style.display = 'block';
    document.getElementById('roomView').style.display = 'none';
    toast("Salon quitté");
}

initMusic(); loadRanking(); loadForum();
</script>
</body>
</html>
