<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JOY PURGE GAME</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('E6E73627-50E3-4391-A7CD-F78DF1523269.png');
            background-size: cover;
            background-position: center;
            opacity: 0.85;
            z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(0,0,0,0.8); border: 2px solid #ff6600; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        h1, h2 { color: #ffcc00; text-align: center; margin-bottom: 15px; }
        .btn { background: #ff3300; color: #ffcc00; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; margin: 5px; font-weight: bold; font-size: 16px; }
        .btn-green { background: #008800; }
        .btn-blue { background: #0066cc; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 2px solid #ff6600; border-radius: 10px; color: white; margin: 8px 0; font-size: 16px; }
        input[type="file"] { padding: 8px; background: #1a1a1a; border: 2px solid #ff6600; border-radius: 10px; color: white; margin: 8px 0; }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: #222; border: 2px solid #ff6600; padding: 10px 20px; border-radius: 30px; color: #ffcc00; cursor: pointer; }
        .nav-btn.active { background: #ff3300; }
        .section { display: none; }
        .section.active { display: block; }
        .players-area { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
        .player-card { background: rgba(0,0,0,0.6); border: 2px solid #ff6600; border-radius: 15px; padding: 15px; min-width: 120px; text-align: center; }
        .player-card.filled { border-color: #00ff00; background: rgba(0,100,0,0.3); }
        .player-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #ffcc00; }
        .code-box { font-size: 2.5em; text-align: center; background: #000; padding: 15px; border-radius: 15px; letter-spacing: 8px; color: #ffcc00; margin: 15px 0; font-weight: bold; }
        .team-card { background: rgba(0,0,0,0.6); border-left: 4px solid #ffcc00; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; }
        .quiz-area { background: rgba(0,0,0,0.95); border-radius: 20px; padding: 25px; }
        .question-text { font-size: 1.2em; text-align: center; margin: 20px 0; color: #ffcc00; }
        .question-img { width: 100%; max-height: 280px; object-fit: cover; object-position: center 20%; border-radius: 15px; background: #0a0a0a; margin: 15px 0; border: 2px solid #ff6600; }
        .answers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .answer { background: #333; border: 2px solid #ff6600; padding: 15px; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.2s; }
        .answer:hover { background: #ff3300; transform: scale(1.02); }
        .answer:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
        .answer.selected { background: #008800; border-color: #00ff00; }
        .answer.correct-display { background: #008800; border-color: #00ff00; }
        .answer.wrong-display { background: #cc0000; border-color: #ff0000; }
        .answer.timeout { background: #555; border-color: #888; opacity: 0.5; text-decoration: line-through; }
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffcc00, #ff6600); width: 0%; transition: width 0.3s; }
        .timer { font-size: 2em; text-align: center; color: #ffcc00; margin: 10px 0; }
        .timer.warning { color: #ff3300; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .forum-msg { background: rgba(0,0,0,0.5); border-left: 3px solid #ff6600; padding: 12px; margin: 8px 0; border-radius: 8px; }
        .admin-link { position: fixed; bottom: 20px; left: 20px; background: #ff3300; padding: 8px 18px; border-radius: 30px; color: white; text-decoration: none; z-index: 200; font-weight: bold; }
        .music-btn { position: fixed; bottom: 20px; right: 20px; background: #000; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #ff6600; z-index: 200; font-size: 22px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ffcc00; color: #000; padding: 10px 20px; border-radius: 30px; z-index: 1000; font-weight: bold; animation: fadeOut 2s; }
        .photo-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #ffcc00; margin-top: 8px; }
        .auth-box { max-width: 500px; margin: 20px auto; padding: 25px; background: rgba(0,0,0,0.85); border: 2px solid #ff6600; border-radius: 20px; }
        .auth-box h3 { color: #ffcc00; text-align: center; margin-bottom: 15px; }
        .auth-box input { margin: 8px 0; }
        .auth-box .btn { width: 100%; margin-top: 8px; }
        .divider { border: none; border-top: 1px solid #ff6600; margin: 20px 0; }
        .team-name-display { font-size: 1.8em; color: #ffcc00; text-align: center; font-weight: bold; margin: 10px 0; }
        
        @keyframes fadeOut { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes gameStartPulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,215,0,0.7); } 70% { transform: scale(1.02); box-shadow: 0 0 30px 10px rgba(255,215,0,0.3); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,215,0,0); } }
        .game-starting { animation: gameStartPulse 0.8s ease 3; border-color: #ffcc00 !important; }
        @keyframes confettiFall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .confetti { position: fixed; width: 10px; height: 10px; border-radius: 2px; z-index: 999; pointer-events: none; animation: confettiFall linear forwards; }
        @keyframes victoryGlow { 0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.5); } 50% { box-shadow: 0 0 60px rgba(255,215,0,0.9), 0 0 120px rgba(255,215,0,0.4); } }
        .victory-card { animation: victoryGlow 1.5s ease infinite; border-color: #ffcc00 !important; }
        .defeat-card { border-color: #cc0000 !important; box-shadow: 0 0 30px rgba(204,0,0,0.5); }
        @media (max-width: 700px) { .answers { grid-template-columns: 1fr; } }
    </style>
</head>

function initMusic() { bgMusic = document.getElementById('bgMusic'); if(bgMusic) bgMusic.volume = 0.2; }
function toggleMusic() { if(!bgMusic) initMusic(); if(musicPlaying) { bgMusic.pause(); musicPlaying=false; document.getElementById('musicBtn').innerHTML='🎵'; } else { bgMusic.play().catch(e=>{}); musicPlaying=true; document.getElementById('musicBtn').innerHTML='🎵🔊'; } }
document.body.addEventListener('click', ()=>{ if(!musicPlaying && bgMusic) { bgMusic.play().catch(e=>{}); musicPlaying=true; document.getElementById('musicBtn').innerHTML='🎵🔊'; } }, {once:true});

function previewPhoto(input, previewId) {
    let preview = document.getElementById(previewId);
    preview.innerHTML = '';
    if(input.files && input.files[0]) {
        let reader = new FileReader();
        reader.onload = (e) => {
            let img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'photo-preview';
            preview.appendChild(img);
        };
        reader.readAsDataURL(input.files[0]);
    }
}

document.getElementById('hostPhotoCreate')?.addEventListener('change', (e) => previewPhoto(e.target, 'hostPhotoPreview'));
document.getElementById('joinPlayerPhoto')?.addEventListener('change', (e) => previewPhoto(e.target, 'joinPhotoPreview'));

function toast(msg, err) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.style.background = err ? '#cc0000' : '#ffcc00';
    t.style.color = err ? '#fff' : '#000';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

function showSection(section) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(section).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if(section === 'classement') loadRanking();
    if(section === 'forum') loadForum();
}

async function loadRanking() {
    try {
        let snap = await db.ref('teams').once('value');
        let teams = [];
        snap.forEach(c => teams.push({ id: c.key, ...c.val() }));
        teams.sort((a,b) => (b.score||0) - (a.score||0));
        let div = document.getElementById('rankingList');
        if(teams.length === 0) { div.innerHTML = 'Aucune équipe classée'; return; }
        div.innerHTML = teams.map((t,i) => `
            <div class="team-card">
                <div><b>${i===0?'👑 ':''}⚔️ ${escapeHtml(t.teamName)}</b><br><small>${t.players ? Object.values(t.players).map(p=>escapeHtml(p.name)).join(' · ') : ''}</small></div>
                <div>⭐ ${t.score||0} pts</div>
            </div>
        `).join('');
    } catch(e) { console.log(e); }
}

async function loadForum() {
    try {
        let snap = await db.ref('forum').once('value');
        let msgs = [];
        snap.forEach(c => msgs.push(c.val()));
        msgs.reverse();
        let div = document.getElementById('forumList');
        if(msgs.length === 0) { div.innerHTML = 'Aucun message'; return; }
        div.innerHTML = msgs.map(m => `
            <div class="forum-msg">
                <b>🔥 ${escapeHtml(m.author)}</b> <small>${m.date||''}</small><br>
                ${escapeHtml(m.message)}
            </div>
        `).join('');
    } catch(e) { console.log(e); }
}

async function postMessage() {
    let a = document.getElementById('forumPseudo').value.trim();
    let m = document.getElementById('forumMessage').value.trim();
    if(!a||!m) { toast("Pseudo et message requis", true); return; }
    try {
        await db.ref('forum').push({ author:a, message:m, date:new Date().toLocaleString() });
        toast("✅ Message publié !");
        document.getElementById('forumPseudo').value = '';
        document.getElementById('forumMessage').value = '';
        loadForum();
    } catch(e) { toast("❌ Erreur: "+e.message, true); }
}

function shuffleArray(arr, seed) {
    let array = [...arr];
    let s = seed || Date.now();
    for(let i = array.length - 1; i > 0; i--) {
        let j = Math.floor((s * 2654435761 + i * 101) % (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
        s = s + 1;
    }
    return array;
}

function loadQuestions(part) {
    let seed = gameSeed + (currentRoomCode ? parseInt(currentRoomCode) : 0);
    if(part === 'partie1') {
        currentQuestions = shuffleArray([...PART1_QUESTIONS], seed);
    } else {
        currentQuestions = shuffleArray([...PART2_QUESTIONS], seed + 999);
    }
    return currentQuestions;
}

// ========== CRÉER UNE ÉQUIPE (HÔTE) ==========
async function createTeam() {
    let teamName = document.getElementById('teamNameCreate').value.trim();
    let password = document.getElementById('teamPasswordCreate').value.trim();
    let hostName = document.getElementById('hostNameCreate').value.trim();
    let photoFile = document.getElementById('hostPhotoCreate').files[0];

    if(!teamName) { toast("❌ Nom de l'équipe requis", true); return; }
    if(password.length < 4) { toast("❌ Mot de passe (min 4 caractères)", true); return; }
    if(!hostName) { toast("❌ Ton pseudo requis", true); return; }

    let code = Math.floor(1000 + Math.random() * 9000).toString();
    let roomRef = db.ref(`rooms/${code}`);

    try {
        let exists = await roomRef.once('value');
        if(exists.exists()) { createTeam(); return; }

        let photoUrl = null;
        if(photoFile) {
            photoUrl = await new Promise((resolve) => {
                let reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(photoFile);
            });
        }

        await roomRef.set({
            teamName: teamName,
            password: password,
            code: code,
            players: [{ id: currentPlayerId, name: hostName, photo: photoUrl, score: 0, answers: [] }],
            status: 'waiting',
            currentQuestion: 0,
            scorePart1: 0,
            createdAt: Date.now()
        });

        currentTeamName = teamName;
        isHost = true;
        toast(`✅ Équipe "${teamName}" créée ! Code: ${code}`);
        enterRoom(code);
    } catch(e) {
        toast("❌ Erreur: " + e.message, true);
    }
}

// ========== RECONNEXION (HÔTE) ==========
async function reconnectTeam() {
    let teamName = document.getElementById('teamNameReconnect').value.trim();
    let password = document.getElementById('teamPasswordReconnect').value.trim();

    if(!teamName || !password) { toast("❌ Nom d'équipe et mot de passe requis", true); return; }

    try {
        let snap = await db.ref('rooms').orderByChild('teamName').equalTo(teamName).once('value');
        let room = null;
        let roomKey = null;
        snap.forEach(c => {
            room = c.val();
            roomKey = c.key;
        });

        if(!room) { toast("❌ Équipe introuvable", true); return; }
        if(room.password !== password) { toast("❌ Mot de passe incorrect", true); return; }

        currentTeamName = teamName;
        isHost = true;
        toast(`✅ Reconnexion réussie ! Code: ${roomKey}`);
        enterRoom(roomKey);
    } catch(e) {
        toast("❌ Erreur: " + e.message, true);
    }
}

// ========== REJOINDRE UNE ÉQUIPE (JOUEUR) ==========
async function joinTeam() {
    let code = document.getElementById('joinCode').value.trim();
    let playerName = document.getElementById('joinPlayerName').value.trim();
    let photoFile = document.getElementById('joinPlayerPhoto').files[0];

    if(!code || code.length !== 4) { toast("❌ Code invalide (4 chiffres)", true); return; }
    if(!playerName) { toast("❌ Ton pseudo requis", true); return; }

    let roomRef = db.ref(`rooms/${code}`);

    try {
        let room = (await roomRef.once('value')).val();
        if(!room) { toast("❌ Salon introuvable", true); return; }
        if(room.players.length >= 2) { toast("❌ Équipe complète (2/2)", true); return; }

        let photoUrl = null;
        if(photoFile) {
            photoUrl = await new Promise((resolve) => {
                let reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(photoFile);
            });
        }

        room.players.push({ id: currentPlayerId, name: playerName, photo: photoUrl, score: 0, answers: [] });
        await roomRef.set(room);

        currentTeamName = room.teamName;
        isHost = false;
        toast(`✅ Rejoint "${room.teamName}" !`);
        enterRoom(code);
    } catch(e) {
        toast("❌ Erreur: " + e.message, true);
    }
}

function enterRoom(code) {
    currentRoomCode = code;
    document.getElementById('homeScreen').style.display = 'none';
    document.getElementById('lobbyScreen').style.display = 'block';
    document.getElementById('gameScreen').style.display = 'none';
    if(roomListener) roomListener();
    watchRoom(code);
}

function watchRoom(code) {
    let roomRef = db.ref(`rooms/${code}`);
    if(roomListener) roomListener();
    
    roomListener = roomRef.on('value', async (snap) => {
        let room = snap.val();
        if(!room) { 
            toast("Salon fermé", true);
            leaveTeam(); 
            return; 
        }

        let playerCount = room.players.length;
        let isHostPlayer = room.players[0]?.id === currentPlayerId;

        document.getElementById('teamNameDisplay').textContent = `⚔️ ${escapeHtml(room.teamName)}`;

        if(room.status === 'waiting') {
            let html = `
                <div style="text-align:center;">
                    <div class="code-box">🔑 ${code}</div>
                    <button class="btn" onclick="copyCode('${code}')">📋 COPIER LE CODE</button>
                    <div class="players-area">
            `;

            for(let i = 0; i < 2; i++) {
                let p = room.players[i];
                html += `
                    <div class="player-card ${p ? 'filled' : ''}">
                        ${p ? (p.photo ? `<img src="${p.photo}">` : `<div style="font-size:2.5em;">👤</div>`) : `<div style="font-size:2.5em;">❓</div>`}
                        <div><strong>${p ? escapeHtml(p.name) : 'En attente...'}</strong></div>
                    </div>
                `;
            }

            html += `</div>`;

            if(isHostPlayer && playerCount === 2) {
                html += `<button class="btn btn-green" onclick="startGame('${code}')">🎮 COMMENCER (${playerCount}/2)</button>`;
            } else if(isHostPlayer) {
                html += `<p>⏳ En attente d'un 2ème joueur... (${playerCount}/2)</p>`;
            } else {
                html += `<p>⏳ En attente que l'hôte commence (${playerCount}/2)</p>`;
            }

            html += `</div>`;
            document.getElementById('lobbyView').innerHTML = html;
            document.getElementById('gameScreen').style.display = 'none';
        }
        else if(room.status === 'playing') {
            document.getElementById('lobbyView').innerHTML = '';
            document.getElementById('gameScreen').style.display = 'block';
            if(currentQuestions.length === 0) {
                loadQuestions(room.currentPart || 'partie1');
            }
            await showQuiz(room, code);
        }
        else if(room.status === 'part2_unlocked') {
            document.getElementById('gameScreen').style.display = 'block';
            let html2 = `
                <div class="quiz-area" style="background-image: url('A24E9D6C-F745-4D39-9AEB-D8120CB16DB8.jpeg'); background-size: cover; background-position: center; text-align:center;">
                    <div style="background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px;">
                        <h2 style="color:#ffcc00;">🏆 PARTIE 1 TERMINÉE !</h2>
                        <div style="font-size:1.5em; margin:20px; color:#ffcc00;">Score: ${room.scorePart1} points</div>
            `;
            if(room.scorePart1 >= 200) {
                html2 += `
                    <p style="color:#00ff00;">✅ Score ≥ 200 ! PARTIE 2 DÉBLOQUÉE !</p>
                    <button class="btn btn-green" onclick="startPart2('${code}')">🖼️ LANCER PARTIE 2</button>
                `;
            } else {
                html2 += `
                    <p style="color:#ff6666;">❌ Score < 200. Partie terminée.</p>
                    <button class="btn" onclick="leaveTeam()">🏠 QUITTER</button>
                `;
            }
            html2 += `</div></div>`;
            document.getElementById('gameScreen').innerHTML = html2;
        }
        else if(room.status === 'finished') {
            showFinalResults(room);
        }
    });
}

function copyCode(code) {
    navigator.clipboard.writeText(code);
    toast("✅ Code copié !");
}

function startTimer() {
    timeLeft = 30;
    isAnswered = false;
    let timerEl = document.getElementById('timerDisplay');
    if(!timerEl) return;
    
    clearInterval(timerInterval);
    timerEl.textContent = "⏱️ 30s";
    timerEl.className = 'timer';
    
    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = "⏱️ " + timeLeft + "s";
        if(timeLeft <= 5) timerEl.className = 'timer warning';
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            timerEl.textContent = "⏱️ 0s";
            document.querySelectorAll('.answer').forEach(b => {
                b.disabled = true;
                if(!b.classList.contains('selected')) {
                    b.classList.add('timeout');
                }
            });
            toast("⏰ Temps écoulé !", true);
            autoSubmitAnswers();
        }
    }, 1000);
}

async function autoSubmitAnswers() {
    let roomRef = db.ref(`rooms/${currentRoomCode}`);
    let room = (await roomRef.once('value')).val();
    if(!room) return;
    
    let q = currentQuestions[room.currentQuestion];
    
    for(let p of room.players) {
        if(!p.answers || !p.answers.includes(room.currentQuestion)) {
            p.lastAnswer = -1;
        }
    }
    await roomRef.set(room);
    
    let updatedRoom = (await roomRef.once('value')).val();
    let activePlayers = updatedRoom.players.filter(p => p.lastAnswer !== -1);
    let wrongCount = activePlayers.filter(p => p.lastAnswer !== q.correct).length;
    
    if(activePlayers.length === 0) {
        toast("⏰ Personne n'a répondu ! 0 point.");
    } else if(wrongCount === 0) {
        for(let p of activePlayers) {
            p.score = (p.score || 0) + 10;
        }
        await roomRef.set(updatedRoom);
        toast("✅ TOUS JUSTES ! +10 points !");
    } else if(wrongCount === 1) {
        for(let p of activePlayers.filter(p => p.lastAnswer === q.correct)) {
            p.score = (p.score || 0) + 5;
        }
        await roomRef.set(updatedRoom);
        toast("⚠️ 1 FAUX ! Les justes gagnent 5 points.");
    } else {
        toast("❌ " + wrongCount + " FAUX ! 0 point.");
    }
    
    setTimeout(async () => {
        await loadNextQuestion(currentRoomCode, room.currentQuestion + 1);
    }, 2000);
}

async function startGame(code) {
    let roomRef = db.ref(`rooms/${code}`);
    let room = (await roomRef.once('value')).val();
    
    gameSeed = Date.now() + parseInt(code);
    loadQuestions('partie1');
    currentPart = 'partie1';
    let qCount = currentQuestions.length;
    
    let updatedPlayers = room.players.map(p => ({ ...p, answers: [], lastAnswer: null }));
    
    await roomRef.update({
        status: 'playing',
        currentQuestion: 0,
        currentPart: 'partie1',
        players: updatedPlayers
    });
    
    toast("🎮 Partie 1 démarrée ! " + qCount + " questions");
}

async function startPart2(code) {
    let roomRef = db.ref(`rooms/${code}`);
    let room = (await roomRef.once('value')).val();
    
    gameSeed = Date.now() + parseInt(code) + 999;
    loadQuestions('partie2');
    currentPart = 'partie2';
    let qCount = currentQuestions.length;
    
    let updatedPlayers = room.players.map(p => ({ ...p, answers: [], lastAnswer: null }));
    
    await roomRef.update({
        status: 'playing',
        currentQuestion: 0,
        currentPart: 'partie2',
        players: updatedPlayers
    });
    
    toast("🖼️ Partie 2 démarrée ! " + qCount + " questions");
}

async function loadNextQuestion(code, qIndex) {
    let roomRef = db.ref(`rooms/${code}`);
    let room = (await roomRef.once('value')).val();
    
    if(qIndex >= currentQuestions.length) {
        if(room.currentPart === 'partie1') {
            let total = room.players.reduce((s,p) => s + (p.score || 0), 0);
            await roomRef.update({ status: 'part2_unlocked', scorePart1: total });
            if(total >= 200) toast("✅ 200 points ! PARTIE 2 DÉBLOQUÉE !");
            else toast(`❌ Score: ${total} points. Partie terminée.`);
        } else {
            let totalScore = room.players.reduce((s,p) => s + (p.score || 0), 0);
            let sp1 = room.scorePart1 || 0;
            await roomRef.update({ status: 'finished', scorePart2: totalScore });
            let teamData = {
                teamName: room.teamName,
                players: room.players,
                score: sp1 + totalScore,
                scorePart1: sp1,
                scorePart2: totalScore,
                date: Date.now()
            };
            await db.ref(`teams/${code}`).set(teamData);
            toast(`🏆 Partie terminée ! Score total: ${sp1 + totalScore} points !`);
            loadRanking();
        }
        return;
    }

    await roomRef.update({ currentQuestion: qIndex });
    let updatedRoom = (await roomRef.once('value')).val();
    await showQuiz(updatedRoom, code);
}

async function showQuiz(room, code) {
    if(room.currentQuestion >= currentQuestions.length) {
        await loadNextQuestion(code, room.currentQuestion);
        return;
    }
    
    let q = currentQuestions[room.currentQuestion];
    if(!q) {
        await loadNextQuestion(code, room.currentQuestion + 1);
        return;
    }

    let totalScore = room.players.reduce((s,p) => s + (p.score || 0), 0);
    let progress = (room.currentQuestion / currentQuestions.length) * 100;

    let statusHtml = `<div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-bottom:15px;">`;
    room.players.forEach(p => {
        let answered = p.answers && p.answers.includes(room.currentQuestion);
        statusHtml += `<span style="color:${answered ? '#00ff00' : '#ff6666'}; font-weight:bold;">${escapeHtml(p.name)} ${answered ? '✅' : '⏳'}</span>`;
    });
    statusHtml += `</div>`;

    let html = `
        <div class="quiz-area">
            <div style="background: rgba(0,0,0,0.85); padding: 20px; border-radius: 15px;">
                ${statusHtml}
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <div>🏆 SCORE: <span style="color:#ffcc00;">${totalScore}</span> pts</div>
                    <div>📋 Question ${room.currentQuestion+1}/${currentQuestions.length}</div>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
                <div id="timerDisplay" class="timer">⏱️ 30s</div>
    `;

    if(q.image) html += `<img src="${q.image}" class="question-img" onerror="this.src='https://via.placeholder.com/300x200/1a1a1a/ff6600?text=Image+non+trouvée'">`;

    html += `<div class="question-text">${escapeHtml(q.text)}</div>
        <div class="answers" id="answersContainer">`;

    q.answers.forEach((ans, i) => {
        html += `<div class="answer" id="answer_${i}" onclick="submitAnswer('${code}', ${room.currentQuestion}, ${i})">${String.fromCharCode(65+i)}. ${escapeHtml(ans)}</div>`;
    });

    html += `</div></div></div>`;
    document.getElementById('gameScreen').innerHTML = html;
    
    startTimer();
}

async function submitAnswer(code, qIndex, ansIdx) {
    if(isAnswered) {
        toast("Vous avez déjà répondu !", true);
        return;
    }
    
    let roomRef = db.ref(`rooms/${code}`);
    let room = (await roomRef.once('value')).val();
    let playerIndex = room.players.findIndex(p => p.id === currentPlayerId);

    if(playerIndex === -1) {
        toast("Joueur non trouvé", true);
        return;
    }

    if(room.players[playerIndex].answers && room.players[playerIndex].answers.includes(qIndex)) {
        toast("Déjà répondu !", true);
        return;
    }

    isAnswered = true;
    
    document.querySelectorAll('.answer').forEach(b => b.disabled = true);
    
    let selectedBtn = document.getElementById('answer_' + ansIdx);
    if(selectedBtn) {
        selectedBtn.classList.add('selected');
    }

    let updatedAnswers = [...(room.players[playerIndex].answers || []), qIndex];
    await roomRef.child(`players/${playerIndex}/answers`).set(updatedAnswers);
    await roomRef.child(`players/${playerIndex}/lastAnswer`).set(ansIdx);

    let updatedRoom = (await roomRef.once('value')).val();
    let allAnswered = updatedRoom.players.every(p => p.answers && p.answers.includes(qIndex));

    if(allAnswered) {
        clearInterval(timerInterval);
        
        let q = currentQuestions[qIndex];
        let activePlayers = updatedRoom.players.filter(p => p.lastAnswer !== -1);
        let wrongCount = activePlayers.filter(p => p.lastAnswer !== q.correct).length;
        
        let qCorrect = q.correct;
        document.querySelectorAll('.answer').forEach((el, idx) => {
            if(idx === qCorrect) {
                el.classList.add('correct-display');
            } else if(room.players.some(p => p.lastAnswer === idx && p.lastAnswer !== qCorrect)) {
                el.classList.add('wrong-display');
            }
        });
        
        if(wrongCount === 0 && activePlayers.length > 0) {
            for(let p of activePlayers) {
                p.score = (p.score || 0) + 10;
            }
            await roomRef.set(updatedRoom);
            toast("✅ TOUS JUSTES ! +10 points !");
        } else if(wrongCount === 1 && activePlayers.length > 1) {
            for(let p of activePlayers.filter(p => p.lastAnswer === q.correct)) {
                p.score = (p.score || 0) + 5;
            }
            await roomRef.set(updatedRoom);
            toast("⚠️ 1 FAUX ! Les justes gagnent 5 points.");
        } else if(activePlayers.length === 1 && wrongCount === 0) {
            for(let p of activePlayers) {
                p.score = (p.score || 0) + 10;
            }
            await roomRef.set(updatedRoom);
            toast("✅ Le seul répondant a juste ! +10 points !");
        } else {
            toast("❌ " + wrongCount + " FAUX ! 0 point.");
        }
        
        setTimeout(async () => {
            await loadNextQuestion(code, qIndex + 1);
        }, 2000);
    } else {
        let roomAfterAnswer = (await roomRef.once('value')).val();
        await showQuiz(roomAfterAnswer, code);
        toast("✅ Réponse enregistrée ! En attente des autres...");
    }
}

function showFinalResults(room) {
    clearInterval(timerInterval);
    let players = [...room.players];
    players.sort((a,b) => (b.score || 0) - (a.score || 0));
    let total = players.reduce((s,p) => s + (p.score || 0), 0);
    let sp1 = room.scorePart1 || 0;
    let sp2 = room.scorePart2 || 0;

    let html = `
        <div class="quiz-area">
            <div style="background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; text-align:center;">
                <h2 style="color:#ffcc00;">🏆 RÉSULTATS FINAUX 🏆</h2>
                <div style="font-size:1.5em; margin:15px; color:#ffcc00;">${escapeHtml(room.teamName)} : ${total} pts</div>
                <div style="display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin:10px 0;">
                    <span>📝 Partie 1: ${sp1} pts</span>
                    <span>🖼️ Partie 2: ${sp2} pts</span>
                </div>
                <div class="players-area">
    `;

    players.forEach(p => {
        html += `
            <div class="player-card filled">
                ${p.photo ? `<img src="${p.photo}">` : `<div style="font-size:2.5em;">👤</div>`}
                <div><strong>${escapeHtml(p.name)}</strong><br><span style="color:#ffcc00;">🎯 ${p.score} pts</span></div>
            </div>
        `;
    });

    html += `</div>
            <button class="btn" onclick="leaveTeam()">🏠 QUITTER</button>
            <button class="btn btn-blue" onclick="showPasswordPrompt()">🔐 RECONNEXION</button>
        </div></div>`;
    document.getElementById('gameScreen').innerHTML = html;
}

function showPasswordPrompt() {
    let html = `
        <div class="auth-box">
            <h3>🔐 RECONNEXION</h3>
            <p style="color:#aaa; text-align:center;">Entrez le mot de passe de l'équipe</p>
            <input type="password" id="reconnectPassword" placeholder="Mot de passe">
            <button class="btn btn-green" onclick="reconnectWithPassword()">🔐 SE RECONNECTER</button>
            <button class="btn" onclick="leaveTeam()" style="background:#555;">🏠 QUITTER</button>
        </div>
    `;
    document.getElementById('gameScreen').innerHTML = html;
}

async function reconnectWithPassword() {
    let password = document.getElementById('reconnectPassword').value.trim();
    if(!password) { toast("❌ Mot de passe requis", true); return; }
    
    let roomRef = db.ref(`rooms/${currentRoomCode}`);
    let room = (await roomRef.once('value')).val();
    if(room && room.password === password) {
        toast("✅ Reconnexion réussie !");
        watchRoom(currentRoomCode);
    } else {
        toast("❌ Mot de passe incorrect", true);
    }
}

async function leaveTeam() {
    if(currentRoomCode) {
        let roomRef = db.ref(`rooms/${currentRoomCode}`);
        let room = (await roomRef.once('value')).val();
        if(room) {
            room.players = room.players.filter(p => p.id !== currentPlayerId);
            if(room.players.length === 0) {
                await roomRef.remove();
            } else {
                await roomRef.set(room);
            }
        }
    }
    if(roomListener) roomListener();
    currentRoomCode = null;
    currentTeamName = '';
    isHost = false;
    document.getElementById('homeScreen').style.display = 'block';
    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('joinCode').value = '';
    document.getElementById('joinPlayerName').value = '';
    document.getElementById('joinPlayerPhoto').value = '';
    document.getElementById('joinPhotoPreview').innerHTML = '';
    currentQuestions = [];
    toast("Équipe quittée");
}

initMusic();
loadRanking();
loadForum();
