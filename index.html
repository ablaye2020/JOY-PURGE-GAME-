<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY PURGE GAME</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('luffy.png');
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(0,0,0,0.85); border: 2px solid #ff6600; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h1, h2 { color: #ffcc00; text-align: center; margin-bottom: 15px; }
        .btn { background: #ff3300; color: #ffcc00; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin: 5px; }
        .btn-green { background: #008800; }
        input { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #ff6600; border-radius: 10px; color: white; margin: 10px 0; }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: #222; border: 2px solid #ff6600; padding: 10px 20px; border-radius: 30px; color: #ffcc00; cursor: pointer; }
        .nav-btn.active { background: #ff3300; }
        .section { display: none; }
        .section.active { display: block; }
        .player-card { display: inline-block; background: rgba(0,0,0,0.6); border: 1px solid #ff6600; border-radius: 15px; padding: 10px; margin: 5px; text-align: center; min-width: 100px; }
        .player-card img { width: 50px; height: 50px; border-radius: 50%; }
        .team-card { background: rgba(0,0,0,0.6); border-left: 4px solid #ffcc00; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .admin-btn { position: fixed; bottom: 20px; left: 20px; background: #ff3300; padding: 8px 15px; border-radius: 30px; color: white; text-decoration: none; }
        .music-btn { position: fixed; bottom: 20px; right: 20px; background: #000; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #ff6600; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ffcc00; color: #000; padding: 8px 16px; border-radius: 20px; z-index: 1000; animation: fadeOut 2s; }
        @keyframes fadeOut { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
<div class="container">
    <a href="admin.html" class="admin-btn">👑 ADMIN</a>
    <div class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</div>
    <div class="card"><h1>⚡ JOY PURGE GAME ⚡</h1><p style="text-align:center;">"UN SEUL FAUX = 0 POINT"</p></div>
    <div class="nav"><button class="nav-btn active" onclick="showSec('classement')">🏆 CLASSEMENT</button><button class="nav-btn" onclick="showSec('jeu')">🎮 JOUER</button><button class="nav-btn" onclick="showSec('forum')">💬 FORUM</button></div>
    <div id="classement" class="section active"><div class="card"><h2>🏆 CLASSEMENT</h2><div id="rankingList">Chargement...</div></div></div>
    <div id="jeu" class="section"><div class="card"><h2>🎮 JOY PURGE GAME</h2><div id="lobby"><input type="text" id="teamName" placeholder="Nom du salon"><input type="text" id="playerName" placeholder="Ton pseudo"><input type="file" id="playerPhoto" accept="image/*"><button class="btn btn-green" onclick="createRoom()">🚀 CRÉER UN SALON</button><hr><input type="text" id="joinCode" maxlength="4" placeholder="Code 4 chiffres"><input type="text" id="joinPlayerName" placeholder="Ton pseudo"><input type="file" id="joinPlayerPhoto" accept="image/*"><button class="btn" onclick="joinRoom()">🔐 REJOINDRE</button></div><div id="roomView" style="display:none;"></div></div></div>
    <div id="forum" class="section"><div class="card"><h2>💬 FORUM</h2><input type="text" id="forumPseudo" placeholder="Pseudo"><textarea id="forumMsg" rows="2" placeholder="Message..."></textarea><button class="btn" onclick="postMsg()">📢 PUBLIER</button><div id="forumList">Chargement...</div></div></div>
</div>
<audio id="bgMusic" loop><source src="song.mp3.m4a" type="audio/mp4"></audio>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script>
const firebaseConfig = { apiKey: "AIzaSyAQI15uRPi-KpQbX4dbLKz1TdzlvHPo_14", authDomain: "joy-purge-game-v2.firebaseapp.com", projectId: "joy-purge-game-v2", storageBucket: "joy-purge-game-v2.firebasestorage.app", messagingSenderId: "1002586059927", appId: "1:1002586059927:web:c46c898954ddcb4dee65d2" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), storage = firebase.storage();
let roomCode = null, playerId = localStorage.getItem('pid') || Math.random().toString(36).substr(2,8);
localStorage.setItem('pid', playerId);
let musicOn = false, bg = null;
function initMusic() { bg = document.getElementById('bgMusic'); if(bg) bg.volume = 0.2; }
function toggleMusic() { if(!bg) initMusic(); if(musicOn) { bg.pause(); musicOn=false; document.getElementById('musicBtn').innerHTML='🎵'; } else { bg.play().catch(e=>{}); musicOn=true; document.getElementById('musicBtn').innerHTML='🎵🔊'; } }
document.body.addEventListener('click', ()=>{ if(!musicOn && bg) { bg.play().catch(e=>{}); musicOn=true; document.getElementById('musicBtn').innerHTML='🎵🔊'; } }, {once:true});
function toast(msg, err) { var t=document.createElement('div'); t.className='toast'; t.style.background=err?'#cc0000':'#ffcc00'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function showSec(s) { document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById(s).classList.add('active'); if(s=='classement') loadRanking(); if(s=='forum') loadForum(); }
async function loadRanking() { var snap = await db.ref('teams/partie1').once('value'); var teams=[]; snap.forEach(c=>teams.push(c.val())); teams.sort((a,b)=>(b.score||0)-(a.score||0)); var div=document.getElementById('rankingList'); if(teams.length==0){ div.innerHTML='Aucune équipe'; return; } div.innerHTML=teams.map((t,i)=>`<div class="team-card"><div><b>${i==0?'👑 ':''}${escapeHtml(t.teamName)}</b><br><small>${t.players?Object.values(t.players).map(p=>escapeHtml(p.name)).join(' · '):''}</small></div><div>⭐ ${t.score||0} pts</div></div>`).join(''); }
async function loadForum() { var snap = await db.ref('forum').once('value'); var msgs=[]; snap.forEach(c=>msgs.push(c.val())); msgs.reverse(); var div=document.getElementById('forumList'); if(msgs.length==0){ div.innerHTML='Aucun message'; return; } div.innerHTML=msgs.map(m=>`<div style="border-left:3px solid #ff6600; padding:8px; margin:8px 0;"><b>🔥 ${escapeHtml(m.author)}</b> <small>${m.date||''}</small><br>${escapeHtml(m.message)}</div>`).join(''); }
async function postMsg() { var a=document.getElementById('forumPseudo').value.trim(); var m=document.getElementById('forumMsg').value.trim(); if(!a||!m){ toast("Pseudo et message requis",true); return; } await db.ref('forum').push({ author:a, message:m, date:new Date().toLocaleString() }); toast("Message publié !"); document.getElementById('forumPseudo').value=''; document.getElementById('forumMsg').value=''; loadForum(); }
async function uploadPhoto(file, path) { if(!file) return null; var ref = storage.ref(`${path}_${Date.now()}_${file.name}`); await ref.put(file); return await ref.getDownloadURL(); }
async function createRoom() { var tn=document.getElementById('teamName').value.trim(); var pn=document.getElementById('playerName').value.trim(); var pf=document.getElementById('playerPhoto').files[0]; if(!tn||!pn){ toast("Nom et pseudo requis",true); return; } var code=Math.floor(1000+Math.random()*9000).toString(); var ref=db.ref(`rooms/${code}`); if((await ref.once('value')).exists()){ createRoom(); return; } var pu=pf?await uploadPhoto(pf,`players/${playerId}`):null; await ref.set({ teamName:tn, players:{ [playerId]:{ id:playerId, name:pn, photo:pu, score:0 } }, status:'waiting', createdAt:Date.now() }); toast(`✅ Salon créé ! Code: ${code}`); enterRoom(code); }
async function joinRoom() { var code=document.getElementById('joinCode').value.trim(); var pn=document.getElementById('joinPlayerName').value.trim(); var pf=document.getElementById('joinPlayerPhoto').files[0]; if(!code||code.length!=4){ toast("Code invalide",true); return; } if(!pn){ toast("Pseudo requis",true); return; } var ref=db.ref(`rooms/${code}`); var room=(await ref.once('value')).val(); if(!room){ toast("Salon introuvable",true); return; } if(Object.keys(room.players).length>=4){ toast("Salon complet",true); return; } if(room.status!='waiting'){ toast("Partie déjà commencée",true); return; } var pu=pf?await uploadPhoto(pf,`players/${playerId}`):null; await ref.child(`players/${playerId}`).set({ id:playerId, name:pn, photo:pu, score:0 }); toast(`✅ Rejoint "${room.teamName}"`); enterRoom(code); }
function enterRoom(code) { roomCode=code; document.getElementById('lobby').style.display='none'; document.getElementById('roomView').style.display='block'; watchRoom(code); }
function watchRoom(code) { var ref=db.ref(`rooms/${code}`); ref.on('value', (snap)=>{ var room=snap.val(); if(!room){ toast("Salon fermé",true); leaveRoom(); return; } var players=room.players, count=Object.keys(players).length, isHost=players[playerId]?true:false; if(room.status=='waiting'){ var html=`<h2>🎮 ${escapeHtml(room.teamName)}</h2><div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">`; for(var i=1;i<=4;i++){ var p=Object.values(players)[i-1]; html+=`<div style="background:rgba(0,0,0,0.6); border:2px solid #ff6600; border-radius:15px; padding:15px; min-width:120px; text-align:center;">${p ? (p.photo?`<img src="${p.photo}" style="width:60px;height:60px;border-radius:50%;">`:`👤`) : `❓`}<div>${p?escapeHtml(p.name):'En attente...'}</div></div>`; } html+=`</div>`; if(isHost && count>=2){ html+=`<button class="btn btn-green" onclick="startGame('${code}')">🎮 COMMENCER (${count}/4)</button>`; }else if(isHost){ html+=`<p>⏳ En attente... (${count}/4)</p>`; }else{ html+=`<p>⏳ En attente que l'hôte commence...</p>`; } html+=`<button class="btn" onclick="leaveRoom()">❌ QUITTER</button>`; document.getElementById('roomView').innerHTML=html; }else if(room.status=='playing'){ showQuiz(room,code); }else if(room.status=='finished'){ showResults(room); } }); }
async function startGame(code){ await db.ref(`rooms/${code}`).update({ status:'playing', currentQuestion:0 }); await loadNextQuestion(code,0); }
async function loadNextQuestion(code,qIndex){ var questions = await db.ref('questions/partie1').once('value'); var qs=[]; questions.forEach(c=>qs.push(c.val())); if(qIndex>=qs.length){ var room=(await db.ref(`rooms/${code}`).once('value')).val(); var total=Object.values(room.players).reduce((s,p)=>s+(p.score||0),0); await db.ref(`rooms/${code}`).update({ status:'finished', finalScore:total }); var teamData={ teamName:room.teamName, players:room.players, score:total, date:Date.now() }; await db.ref(`teams/partie1/${code}`).set(teamData); await loadRanking(); return; } await db.ref(`rooms/${code}`).update({ currentQuestion:qIndex }); showQuiz((await db.ref(`rooms/${code}`).once('value')).val(),code); }
async function showQuiz(room,code){ var questions=await db.ref('questions/partie1').once('value'); var qs=[]; questions.forEach(c=>qs.push(c.val())); var q=qs[room.currentQuestion]; var total=Object.values(room.players).reduce((s,p)=>s+(p.score||0),0); var html=`<div><div>🏆 SCORE: ${total} pts</div><div>📋 Question ${room.currentQuestion+1}/${qs.length}</div><div style="font-size:1.2em; margin:20px;">${escapeHtml(q.text)}</div><div style="display:flex; gap:10px; flex-wrap:wrap;">`; q.answers.forEach((a,i)=>{ html+=`<div class="btn" onclick="submitAnswer('${code}',${room.currentQuestion},${i})">${String.fromCharCode(65+i)}. ${escapeHtml(a)}</div>`; }); html+=`</div></div>`; document.getElementById('roomView').innerHTML=html; }
async function submitAnswer(code,qIndex,ansIdx){ var room=(await db.ref(`rooms/${code}`).once('value')).val(); var questions=await db.ref('questions/partie1').once('value'); var qs=[]; questions.forEach(c=>qs.push(c.val())); var q=qs[qIndex]; if(room.players[playerId].lastAnswer!=undefined){ toast("Déjà répondu !",true); return; } await db.ref(`rooms/${code}/players/${playerId}/lastAnswer`).set(ansIdx); var all=Object.values(room.players); var allAnswered=all.every(p=>p.lastAnswer!==undefined); if(allAnswered){ var allCorrect=all.every(p=>p.lastAnswer===q.correct); if(allCorrect){ for(var pid of Object.keys(room.players)){ var ns=(room.players[pid].score||0)+10; await db.ref(`rooms/${code}/players/${pid}/score`).set(ns); } toast("✅ TOUS JUSTES ! +10 points !"); }else{ toast("❌ QUELQU'UN A FAUX ! 0 point !"); } await loadNextQuestion(code,qIndex+1); }else{ toast("✅ Réponse enregistrée ! En attente..."); } }
function showResults(room){ var players=Object.values(room.players); players.sort((a,b)=>(b.score||0)-(a.score||0)); var total=players.reduce((s,p)=>s+(p.score||0),0); var html=`<h2>🏆 RÉSULTATS</h2><div>${escapeHtml(room.teamName)} : ${total} pts</div><div style="display:flex; gap:10px; flex-wrap:wrap;">`; players.forEach(p=>{ html+=`<div style="background:rgba(0,0,0,0.6); border:1px solid #ff6600; border-radius:15px; padding:10px; text-align:center;">${p.photo?`<img src="${p.photo}" style="width:50px;height:50px;border-radius:50%;">`:`👤`}<div>${escapeHtml(p.name)}<br>🎯 ${p.score} pts</div></div>`; }); html+=`</div><button class="btn" onclick="leaveRoom()">🏠 QUITTER</button>`; document.getElementById('roomView').innerHTML=html; }
async function leaveRoom(){ if(roomCode){ var ref=db.ref(`rooms/${roomCode}`); await ref.child(`players/${playerId}`).remove(); var snap=await ref.once('value'); if(snap.exists() && Object.keys(snap.val().players).length===0) await ref.remove(); } roomCode=null; document.getElementById('lobby').style.display='block'; document.getElementById('roomView').style.display='none'; toast("Salon quitté"); }
initMusic(); loadRanking(); loadForum();
</script>
</body>
</html>
