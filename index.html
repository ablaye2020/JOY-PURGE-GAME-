<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY PURGE GAME</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('luffy.png');
            background-size: cover;
            background-position: center;
            opacity: 0.85;
            z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(0,0,0,0.8); border: 2px solid #ff6600; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        h1, h2 { color: #ffcc00; text-align: center; margin-bottom: 15px; }
        .btn { background: #ff3300; color: #ffcc00; border: none; padding: 14px 30px; border-radius: 30px; cursor: pointer; margin: 5px; font-weight: bold; font-size: 18px; }
        .btn-green { background: #008800; }
        input { width: 100%; padding: 14px; background: #1a1a1a; border: 2px solid #ff6600; border-radius: 10px; color: white; margin: 10px 0; font-size: 18px; }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .nav-btn { background: #222; border: 2px solid #ff6600; padding: 10px 25px; border-radius: 30px; color: #ffcc00; cursor: pointer; }
        .nav-btn.active { background: #ff3300; }
        .section { display: none; }
        .section.active { display: block; }
        .admin-link { position: fixed; bottom: 20px; left: 20px; background: #ff3300; padding: 8px 18px; border-radius: 30px; color: white; text-decoration: none; z-index: 200; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ffcc00; color: #000; padding: 12px 24px; border-radius: 30px; z-index: 1000; font-weight: bold; animation: fadeOut 2s; }
        @keyframes fadeOut { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
<div class="container">
    <a href="admin.html" class="admin-link">👑 ADMIN</a>

    <div class="card" style="text-align:center;">
        <h1>⚡ JOY PURGE GAME ⚡</h1>
        <p>"UN SEUL FAUX = 0 POINT"</p>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="showSection('jeu')">🎮 JOUER</button>
        <button class="nav-btn" onclick="showSection('classement')">🏆 CLASSEMENT</button>
    </div>

    <div id="jeu" class="section active">
        <div class="card">
            <h2>🎮 JOY PURGE GAME</h2>
            <div id="lobbyView">
                <h3>🚀 CRÉER UN SALON</h3>
                <input type="text" id="teamName" placeholder="Nom de l'équipe">
                <input type="text" id="playerName" placeholder="Ton pseudo">
                <button class="btn btn-green" onclick="createTeam()" style="width:100%;">🔥 CRÉER LE SALON</button>

                <hr style="border-color:#ff6600; margin:30px 0;">

                <h3>🔑 REJOINDRE UN SALON</h3>
                <input type="text" id="joinCode" maxlength="4" placeholder="Code à 4 chiffres">
                <input type="text" id="joinPlayerName" placeholder="Ton pseudo">
                <button class="btn" onclick="joinTeam()" style="width:100%;">🔐 REJOINDRE</button>
            </div>
            <div id="roomView" style="display:none;"></div>
        </div>
    </div>

    <div id="classement" class="section">
        <div class="card"><h2>🏆 CLASSEMENT</h2><div id="rankingList">Chargement...</div></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCIAbgsaNBm2K2NhHzkefT77eOW2wwiBhw",
    authDomain: "joy-purge-game.firebaseapp.com",
    projectId: "joy-purge-game",
    storageBucket: "joy-purge-game.firebasestorage.app",
    messagingSenderId: "266355310555",
    appId: "1:266355310555:web:5d5296e5b138d4221db1fe"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoomCode = null;
let currentPlayerId = localStorage.getItem('playerId');
if(!currentPlayerId) {
    currentPlayerId = Math.random().toString(36).substr(2, 8);
    localStorage.setItem('playerId', currentPlayerId);
}

function toast(msg, err) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.style.background = err ? '#cc0000' : '#ffcc00';
    t.style.color = err ? '#fff' : '#000';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

function showSection(section) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(section).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if(section === 'classement') loadRanking();
}

async function loadRanking() {
    try {
        let snap = await db.ref('teams').once('value');
        let teams = [];
        snap.forEach(c => teams.push(c.val()));
        teams.sort((a,b) => (b.score||0) - (a.score||0));
        let div = document.getElementById('rankingList');
        if(teams.length === 0) { div.innerHTML = 'Aucune équipe'; return; }
        div.innerHTML = teams.map((t,i) => `<div style="background:rgba(0,0,0,0.6); border-left:4px solid #ffcc00; padding:10px; margin:8px 0; display:flex; justify-content:space-between;"><div><b>${i===0?'👑 ':''}${t.teamName}</b><br><small>${t.players?.map(p=>p.name).join(' · ')}</small></div><div>⭐ ${t.score||0} pts</div></div>`).join('');
    } catch(e) { console.log(e); }
}

async function createTeam() {
    let teamName = document.getElementById('teamName').value.trim();
    let playerName = document.getElementById('playerName').value.trim();

    if(!teamName) { toast("❌ Nom de l'équipe requis", true); return; }
    if(!playerName) { toast("❌ Ton pseudo requis", true); return; }

    let code = Math.floor(1000 + Math.random() * 9000).toString();
    let roomRef = db.ref(`rooms/${code}`);

    try {
        console.log("🔵 Tentative de création du salon:", code);

        let snapshot = await roomRef.once('value');
        if(snapshot.exists()) {
            createTeam();
            return;
        }

        await roomRef.set({
            teamName: teamName,
            players: [{ id: currentPlayerId, name: playerName, score: 0 }],
            status: 'waiting',
            createdAt: Date.now()
        });

        console.log("✅ Salon créé avec succès !");

        toast(`✅ Salon "${teamName}" créé ! Code: ${code}`);
        enterRoom(code);
    } catch(e) {
        console.error("❌ Erreur:", e);
        toast("❌ Erreur: " + e.message, true);
    }
}

async function joinTeam() {
    let code = document.getElementById('joinCode').value.trim();
    let playerName = document.getElementById('joinPlayerName').value.trim();

    if(!code || code.length !== 4) { toast("❌ Code invalide (4 chiffres)", true); return; }
    if(!playerName) { toast("❌ Ton pseudo requis", true); return; }

    let roomRef = db.ref(`rooms/${code}`);

    try {
        console.log("🔵 Tentative de rejoindre:", code);

        let room = (await roomRef.once('value')).val();
        if(!room) { toast("❌ Salon introuvable", true); return; }
        if(room.players.length >= 4) { toast("❌ Salon complet (4/4)", true); return; }
        if(room.status !== 'waiting') { toast("❌ Partie déjà commencée", true); return; }

        room.players.push({ id: currentPlayerId, name: playerName, score: 0 });
        await roomRef.set(room);

        console.log("✅ Rejoint avec succès !");

        toast(`✅ Rejoint "${room.teamName}" !`);
        enterRoom(code);
    } catch(e) {
        console.error("❌ Erreur:", e);
        toast("❌ Erreur: " + e.message, true);
    }
}

function enterRoom(code) {
    currentRoomCode = code;
    document.getElementById('lobbyView').style.display = 'none';
    document.getElementById('roomView').style.display = 'block';
    watchRoom(code);
}

function watchRoom(code) {
    let roomRef = db.ref(`rooms/${code}`);

    roomRef.on('value', (snap) => {
        let room = snap.val();
        if(!room) {
            document.getElementById('roomView').innerHTML = `<h2>Salon fermé</h2><button class="btn" onclick="leaveRoom()">🏠 QUITTER</button>`;
            return;
        }

        let isHost = room.players[0]?.id === currentPlayerId;
        let playerCount = room.players.length;

        let html = `
            <div style="text-align:center;">
                <h2>🎮 ${room.teamName}</h2>
                <div style="font-size:2.5em; background:#000; padding:15px; border-radius:15px; letter-spacing:8px; color:#ffcc00; margin:15px 0; font-weight:bold;">🔑 ${code}</div>
                <button class="btn" onclick="copyCode('${code}')">📋 COPIER LE CODE</button>
                <div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin:20px 0;">
        `;

        for(let i = 0; i < 4; i++) {
            let p = room.players[i];
            html += `
                <div style="background:rgba(0,0,0,0.6); border:2px solid ${p ? '#00ff00' : '#ff6600'}; border-radius:15px; padding:15px; min-width:120px; text-align:center;">
                    <div style="font-size:2.5em;">${p ? '👤' : '❓'}</div>
                    <div><strong>${p ? p.name : 'En attente...'}</strong></div>
                </div>
            `;
        }

        html += `</div>`;

        if(isHost && playerCount >= 2) {
            html += `<button class="btn btn-green" onclick="toast('🎮 Partie démarrée !')">🎮 COMMENCER (${playerCount}/4)</button>`;
        } else if(isHost) {
            html += `<p>⏳ En attente de joueurs... (${playerCount}/4 minimum 2)</p>`;
        } else {
            html += `<p>⏳ En attente que l'hôte commence la partie...</p>`;
        }

        html += `<button class="btn" onclick="leaveRoom()">❌ QUITTER</button></div>`;

        document.getElementById('roomView').innerHTML = html;
    });
}

function copyCode(code) {
    navigator.clipboard.writeText(code);
    toast("✅ Code copié !");
}

async function leaveRoom() {
    if(currentRoomCode) {
        let roomRef = db.ref(`rooms/${currentRoomCode}`);
        let room = (await roomRef.once('value')).val();
        if(room) {
            room.players = room.players.filter(p => p.id !== currentPlayerId);
            if(room.players.length === 0) {
                await roomRef.remove();
            } else {
                await roomRef.set(room);
            }
        }
    }
    currentRoomCode = null;
    document.getElementById('lobbyView').style.display = 'block';
    document.getElementById('roomView').style.display = 'none';
    toast("Salon quitté");
}

loadRanking();
</script>
</body>
</html>
